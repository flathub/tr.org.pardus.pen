app-id: tr.org.pardus.pen
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: pardus-pen
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

modules:
  - name: pardus-pen
    buildsystem: meson
    build-options:
      append-path: /usr/libexec:/usr/lib/libexec
    config-opts:
      - -Dqt=6
      - -Dpdf=false
      - -Dscreenshot=false
      - -Dbackgrounds=/app/backgrounds
      - -Dicon-name=tr.org.pardus.pen
    sources:
      - type: archive
        url: https://github.com/pardus/pardus-pen/archive/232da396f35e07ec5c38c584577138f1621ce0d7.zip
        sha256: c8376470a9a16599f1d914cba352cfeeade7d808eb288b802282671e8fb37bbd

