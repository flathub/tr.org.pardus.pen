app-id: tr.org.pardus.pen
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: pardus-pen
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

modules:
  - name: pardus-pen
    buildsystem: meson
    build-options:
      append-path: /usr/libexec:/usr/lib/libexec
    config-opts:
      - -Dqt=6
      - -Dpdf=false
      - -Dscreenshot=false
      - -Dbackgrounds=/app/backgrounds
    sources:
      - type: archive
        url: https://github.com/pardus/pardus-pen/archive/f3cf748a8c88645952ebbb098085227fcca63c6d.zip
        sha256: ca5c26d4c7def8b78dbe36cc653136ebb0346ba687311439e127ce19dd2f7431

