app-id: tr.org.pardus.pen
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: pardus-pen
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

modules:
  - name: pardus-pen
    buildsystem: meson
    build-options:
      append-path: /usr/libexec:/usr/lib/libexec
    config-opts:
      - -Dqt=6
      - -Dpdf=false
      - -Dscreenshot=false
      - -Dbackgrounds=/app/backgrounds
      - -Dicon-name=tr.org.pardus.pen
    sources:
      - type: archive
        url: https://github.com/pardus/pardus-pen/archive/refs/tags/debian/4.1.5.zip
        sha256: 3fd58d913da3a547c3d521db9bebb19c3a4c5c7356ec117407f413ef789225ee

