app-id: tr.org.pardus.pen
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: pardus-pen
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

modules:
  - name: pardus-pen
    buildsystem: meson
    build-options:
      append-path: /usr/libexec:/usr/lib/libexec
    config-opts:
      - -Dqt=6
      - -Dpdf=false
      - -Dscreenshot=false
      - -Dbackgrounds=/app/backgrounds
    sources:
      - type: archive
        url: https://github.com/pardus/pardus-pen/archive/refs/tags/debian/4.1.3.tar.gz
        sha256: 902cab7266333b523e173bc52640fd4adf3131a3955c47ac90aa14d5a3e97549

