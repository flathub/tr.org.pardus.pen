app-id: tr.org.pardus.pen
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: pardus-pen
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc

modules:
  - name: pardus-pen
    buildsystem: meson
    build-options:
      append-path: /usr/libexec:/usr/lib/libexec
    config-opts:
      - -Dqt=6
      - -Dpdf=false
      - -Dscreenshot=false
      - -Dbackgrounds=/app/backgrounds
    sources:
      - type: archive
        url: https://github.com/pardus/pardus-pen/archive/refs/tags/debian/4.1.4.tar.gz
        sha256: 75b839d5f2747cd87258fef6ec3477e1b9fdbd7150ec051239d64fb84d3b99d7

